    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 50%, #16213e 100%);
            color: #e2e8f0;
            overflow-x: hidden;
        }
        
        /* Scroll Snap Sections */
        main {
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            height: 100vh;
        }
        
        section {
            scroll-snap-align: start;
            scroll-snap-stop: always;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        /* Cosmic Background */
        .cosmic-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #00ffff, rgba(0,255,255,0)),
                radial-gradient(2px 2px at 60px 70px, #ff00ff, rgba(255,0,255,0)),
                radial-gradient(1px 1px at 50px 50px, #00ff00, rgba(0,255,0,0));
            background-size: 200px 200px;
            background-position: 0 0, 50px 50px, 100px 100px;
            animation: starfield 20s linear infinite;
            opacity: 0.3;
            z-index: 1;
        }
        
        @keyframes starfield {
            0% { background-position: 0 0, 50px 50px, 100px 100px; }
            100% { background-position: 200px 200px, 250px 250px, 300px 300px; }
        }
        
        /* Neon Glow Effects */
        .neon-cyan { 
            color: #00f3ff;
            text-shadow: 0 0 10px #00f3ff, 0 0 20px #00f3ff, 0 0 30px #0099cc;
        }
        
        .neon-purple { 
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 30px #cc00ff;
        }
        
        .neon-green { 
            color: #39ff14;
            text-shadow: 0 0 10px #39ff14, 0 0 20px #39ff14, 0 0 30px #00cc00;
        }
        
        /* Spinning Logo */
        .spinning-logo {
            width: 120px;
            height: 120px;
            animation: spin 8s linear infinite;
            filter: drop-shadow(0 0 20px #00f3ff) drop-shadow(0 0 40px #ff00ff);
        }
        
        .logo-image {
            width: 220px;
            height: 220px;
            object-fit: contain;
            animation: float-pulse 4s ease-in-out infinite;
            filter: drop-shadow(0 0 40px rgba(0,243,255,0.9)) drop-shadow(0 0 80px rgba(255,0,255,0.7)) 
                    drop-shadow(0 0 120px rgba(0,255,0,0.3));
            transition: all 0.3s ease;
        }
        
        .logo-image:hover {
            transform: scale(1.08);
            filter: drop-shadow(0 0 60px rgba(0,243,255,1)) drop-shadow(0 0 120px rgba(255,0,255,0.9)) 
                    drop-shadow(0 0 180px rgba(0,255,0,0.5));
        }
        
        @keyframes spin {
            0% { transform: rotateY(0deg) rotateX(10deg); }
            50% { transform: rotateY(180deg) rotateX(10deg); }
            100% { transform: rotateY(360deg) rotateX(10deg); }
        }
        
        @keyframes float-pulse {
            0%, 100% { transform: translateY(0px); opacity: 1; }
            50% { transform: translateY(-15px); opacity: 0.95; }
        }
        
        /* Holographic Text */
        .holographic {
            background: linear-gradient(135deg, #00f3ff, #ff00ff, #39ff14, #00f3ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 8s ease infinite;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #00f3ff, #ff00ff);
            color: #0f172a;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.8), 0 0 40px rgba(255, 0, 255, 0.6);
        }
        
        .btn-secondary {

            border: 2px solid #00f3ff;
            color: #00f3ff;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;

        .btn-secondary:hover {

        }
        
        /* Cards */

            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(10px);

            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
            transform: translateY(-4px);
        }
        
        /* Chat Container */

            overflow-y: auto;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid rgba(0, 243, 255, 0.2);

        .chat-message {

            padding: 12px;
            border-radius: 8px;
        }
        
        .chat-message.user {
            background: rgba(0, 243, 255, 0.2);
            text-align: right;
            margin-left: 20%;
        }
        
        .chat-message.assistant {

            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9em;

        /* Table Styles */
        .comparison-table {

            border-collapse: collapse;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .comparison-table th,

            padding: 16px;
            text-align: left;
            border-bottom: 1px solid rgba(0, 243, 255, 0.1);
        }
        
        .comparison-table th {
            background: rgba(0, 243, 255, 0.1);
            color: #00f3ff;
            font-weight: 600;
        }
        
        .comparison-table tr:last-child td {
            border-bottom: none;

            background: rgba(0, 243, 255, 0.05);
        }
        
        .comparison-table .highlight {
            color: #39ff14;
            font-weight: 600;
        }
        
        /* Forms */
        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.5);

        .form-input:focus, .form-textarea:focus, .form-select:focus {

            border-color: #00f3ff;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
        }
        
        /* Marketplace Grid */
        .marketplace-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
        }
        
        .marketplace-card {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 12px;
            padding: 16px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .marketplace-card:hover {
            border-color: #00f3ff;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
            transform: translateY(-6px);
        }
        
        /* Loading Animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 243, 255, 0.3);
            border-radius: 50%;
            border-top-color: #00f3ff;
            animation: spin 0.8s linear infinite;
        }
        
        /* Slider */
        .slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(0, 243, 255, 0.2);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00f3ff, #ff00ff);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }
        
        .slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00f3ff, #ff00ff);
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }
        
        /* Section Title */
        .section-title {
            font-size: 3rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .section-subtitle {
            font-size: 1.25rem;
            text-align: center;
            color: #94a3b8;
            margin-bottom: 40px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .section-title {
                font-size: 2rem;
            }
            
            .marketplace-grid {
                grid-template-columns: 1fr;
            }
            
            .comparison-table {
                font-size: 0.9em;
            }
            
            .comparison-table th,
            .comparison-table td {
                padding: 8px;
            }
        }
        
        /* SVG Coin (Or4cl3 Logo) */
        .coin {
            perspective: 1000px;
        }
        
        /* React Flow Custom Nodes */
        .react-flow__node {
            background: rgba(15, 23, 42, 0.95) !important;
            border: 2px solid rgba(0, 243, 255, 0.5) !important;
            border-radius: 8px !important;
            padding: 12px !important;
            color: #e2e8f0 !important;
        }
        
        .react-flow__node.selected {
            border-color: #00f3ff !important;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5) !important;
        }
        
        .react-flow__edge-path {
            stroke: #00f3ff !important;
            stroke-width: 2px !important;
        }
        
        .react-flow__edge.selected .react-flow__edge-path {
            stroke: #ff00ff !important;
        }
        
        .react-flow__background {
            background-color: rgba(15, 23, 42, 0.5) !important;
        }
        
        /* Pulse Animation */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }
    </style>
</head>

        // ==================== SECTION 3: BUILD CONSOLE ====================
        function Section3_BuildConsole() {
            const [messages, setMessages] = useState([
                { role: 'assistant', content: 'Hello! I\'m Astrid, your AI build assistant. Describe what you want to create, and I\'ll help you build it. Type something like: "Create an agent that analyzes emails"' }
            ]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const chatRef = useRef(null);
            
            useEffect(() => {
                if (chatRef.current) {
                    chatRef.current.scrollTop = chatRef.current.scrollHeight;
                }
            }, [messages]);
            
            const sendMessage = async () => {
                if (!input.trim()) return;
                
                const userMessage = { role: 'user', content: input };
                setMessages(prev => [...prev, userMessage]);
                setInput('');
                setLoading(true);
                
                try {
                    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': 'Bearer gsk_8L8jvJqJvVm0DlN5JOvvWGdyb3FYOWQxNHJ0VUxQcw==',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: 'llama-3.3-70b-versatile',
                            messages: [
                                { role: 'system', content: 'You are Astrid, a helpful AI build assistant for Arch1tech OS. Help users create agents, workflows, and custom models. Be concise and practical. Suggest JSON configs and deployment options.' },
                                ...messages.map(m => ({ role: m.role, content: m.content })),
                                { role: 'user', content: input }
                            ],
                            max_tokens: 500,
                            temperature: 0.7
                        })
                    });
                    
                    if (!response.ok) {
                        throw new Error(`API error: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    const assistantMessage = {
                        role: 'assistant',
                        content: data.choices[0].message.content
                    };
                    setMessages(prev => [...prev, assistantMessage]);
                } catch (error) {
                    const errorMessage = {
                        role: 'assistant',
                        content: `⚠️ Error: ${error.message}. This is expected if Groq API key is not valid. In production, this would connect to live Groq Llama 3.3 70B.`
                    };
                    setMessages(prev => [...prev, errorMessage]);
                }
                
                setLoading(false);
            };
            
            return (
                <section className="cosmic-bg">
                    <div className="absolute inset-0 z-10" style={{
                        background: 'radial-gradient(circle at center, transparent 0%, rgba(15,23,42,0.8) 100%)'
                    }}></div>
                    
                    <div className="relative z-20 w-full max-w-2xl mx-auto px-4">
                        <h2 className="section-title holographic">Build Console</h2>
                        <p className="section-subtitle">Chat with Astrid - Real Groq Llama 3.3 70B</p>
                        
                        <div className="card">
                            {/* Chat Display */}
                            <div className="chat-container mb-4" ref={chatRef}>
                                {messages.map((msg, idx) => (
                                    <div key={idx} className={`chat-message ${msg.role}`}>
                                        <div className="font-semibold text-xs mb-1 opacity-70">
                                            {msg.role === 'user' ? '👤 You' : '🤖 Astrid'}
                                        </div>
                                        <div className="text-sm leading-relaxed">
                                            {msg.content}
                                        </div>
                                    </div>
                                ))}
                                {loading && (
                                    <div className="chat-message assistant">
                                        <div className="flex gap-2">
                                            <div className="loading"></div>
                                            <span>Astrid is thinking...</span>
                                        </div>
                                    </div>
                                )}
                            </div>
                            
                            {/* Input */}
                            <div className="flex gap-2">
                                <input
                                    type="text"
                                    className="form-input flex-1"
                                    placeholder="Describe your AI agent, workflow, or model..."
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && sendMessage()}
                                />
                                <button
                                    className="btn-primary px-6"
                                    onClick={sendMessage}
                                    disabled={loading || !input.trim()}
                                >
                                    Send
                                </button>
                            </div>
                            
                            <div className="mt-4 text-xs text-gray-500 text-center">
                                💡 Try: "Create an agent that analyzes customer emails" or "Build a workflow that processes invoices"
                            </div>
                        </div>

        // ==================== SECTION 9: MODEL PLAYGROUND ====================
        function Section9_ModelPlayground() {
            const [selectedModel, setSelectedModel] = useState('gpt2');
            const [prompt, setPrompt] = useState('');
            const [output, setOutput] = useState('');
            const [loading, setLoading] = useState(false);
            const [temperature, setTemperature] = useState(0.7);
            const [maxTokens, setMaxTokens] = useState(100);
            
            const models = [
                { id: 'gpt2', name: 'GPT-2', params: '1.5B' },
                { id: 'distilgpt2', name: 'DistilGPT-2', params: '82M' },
                { id: 'llama', name: 'Llama 2 7B', params: '7B' },
                { id: 'mistral', name: 'Mistral 7B', params: '7B' },
                { id: 'falcon', name: 'Falcon 7B', params: '7B' }
            ];
            
            const runInference = async () => {
                if (!prompt.trim()) return;
                
                setLoading(true);
                setOutput('');
                
                try {
                    // Simulate inference with streaming effect
                    const response = `[${selectedModel.toUpperCase()} Output]\n\n${prompt}\n\n...Model inference would complete here with high quality results from ${selectedModel}. In production, this connects to HuggingFace Inference API or local WebGPU model.`;
                    
                    // Simulate streaming by typing out response
                    for (let i = 0; i < response.length; i++) {
                        await new Promise(r => setTimeout(r, 10));
                        setOutput(response.substring(0, i + 1));
                    }
                } catch (error) {
                    setOutput(`Error: ${error.message}`);
                }
                
                setLoading(false);
            };
            
            return (
                <section className="cosmic-bg">
                    <div className="absolute inset-0 z-10" style={{
                        background: 'radial-gradient(circle at center, transparent 0%, rgba(15,23,42,0.8) 100%)'
                    }}></div>

                                <div className="grid grid-cols-2 gap-2">
                                    {models.map(model => (
                                        <button
                                            key={model.id}
                                            className={`p-3 rounded-lg border-2 transition-all text-left ${
                                                selectedModel === model.id
                                                    ? 'border-cyan-500 bg-cyan-500/20'
                                                    : 'border-cyan-500/30 hover:border-cyan-500'
                                            }`}
                                            onClick={() => setSelectedModel(model.id)}
                                        >
                                            <div className="font-bold text-sm">{model.name}</div>
                                            <div className="text-xs text-gray-400">{model.params}</div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                            
                            {/* Prompt Input */}

                                <label className="block text-sm font-bold mb-2 text-cyan-400">Prompt</label>
                                <textarea
                                    className="form-textarea h-20"
                                    placeholder="Enter your prompt here..."

                                    onChange={(e) => setPrompt(e.target.value)}
                                />
                            </div>
                            
                            {/* Parameters */}
                            <div className="grid grid-cols-2 gap-4 mb-4">
                                <div>
                                    <label className="block text-sm font-bold mb-2 text-cyan-400">
                                        Temperature: {temperature.toFixed(2)}
                                    </label>
                                    <input
                                        type="range"
                                        className="slider"
                                        min="0"
                                        max="2"
                                        step="0.1"
                                        value={temperature}
                                        onChange={(e) => setTemperature(parseFloat(e.target.value))}
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold mb-2 text-cyan-400">
                                        Max Tokens: {maxTokens}

                            </div>
                            
                            {/* Run Button */}
                            <button
                                className="btn-primary w-full"

                                {loading ? '⚡ Running...' : '▶️ Run Inference'}

                            {/* Output */}
                            {output && (
                                <div className="mt-4 p-4 bg-black/50 rounded-lg border border-green-500/50">

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {deploymentTargets.map(target => (
                                <div key={target.id} className="card">
                                    <div className="flex items-start justify-between mb-4">
                                        <div>
                                            <div className="text-3xl mb-2">{target.icon}</div>
                                            <h3 className="text-cyan-400 font-bold text-lg">{target.name}</h3>
                                            <p className="text-sm text-gray-400">{target.description}</p>
                                        </div>
                                    </div>
                                    
                                    <button
                                        className="btn-primary w-full mb-4"
                                        onClick={() => deploy(target.id)}
                                        disabled={deployments[target.id]?.status === 'deploying'}
                                    >
                                        {deployments[target.id]?.status === 'deploying' && (
                                            <span className="flex items-center gap-2">
                                                <span className="loading"></span>
                                                Deploying...
                                            </span>
                                        )}
                                        {deployments[target.id]?.status !== 'deploying' && target.action}
                                    </button>
                                    
                                    {deployments[target.id]?.logs.length > 0 && (
                                        <div className="bg-black/50 rounded-lg p-3 text-xs font-mono max-h-32 overflow-y-auto">
                                            {deployments[target.id]?.logs.map((log, idx) => (
                                                <div key={idx} className="text-green-400 mb-1">
                                                    $ {log}
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                    
                                    {deployments[target.id]?.status === 'success' && (
                                        <div className="mt-3 p-3 bg-green-500/20 border border-green-500 rounded-lg">
                                            <div className="text-green-400 text-sm font-bold">✅ Deployed Successfully</div>
                                            <div className="text-xs text-green-300 mt-1">
                                                Live URL: https://{target.id}.example.com
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                        
                        {/* Footer CTA */}
                        <div className="mt-12 text-center">
                            <div className="card inline-block">
                                <h3 className="text-cyan-400 font-bold mb-2">Ready to Build?</h3>
                                <p className="text-gray-400 mb-4">Create your first agent, workflow, or model today.</p>
                                <button className="btn-primary px-8">
                                    🚀 Launch Dashboard
                                </button>
                            </div>
                        </div>
                    </div>
                </section>
            );
        }
        
        // Render the app
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    
    <!-- PWA Manifest -->

        \"name\": \"Arch1tech OS\",

        \"description\": \"Build Advanced AI. No Code. No Limits.\",
        \"start_url\": \"/\",
        \"display\": \"standalone\",

        \"theme_color\": \"#00f3ff\",

            \"src\": \"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%230f172a' width='192' height='192'/><circle cx='96' cy='96' r='80' fill='%2300f3ff'/><text x='96' y='110' text-anchor='middle' fill='%230f172a' font-size='60' font-weight='bold'>A</text></svg>\",
            \"sizes\": \"192x192\",
            \"type\": \"image/svg+xml\"
        }]
    }">
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript,self.addEventListener("install",e=>{e.waitUntil(caches.open("v1").then(c=>c.addAll(["/"])))});self.addEventListener("fetch",e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)))})');
        }
    </script>
</body>
